<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-label="Playwright locator preference ladder">
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="40" y="42" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Locator preference ladder</text>
  <text x="40" y="72" fill="#4b5563" font-family="Segoe UI, Arial, sans-serif" font-size="15">Prefer how users and assistive tech see the page</text>
  <rect x="100" y="100" width="760" height="48" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="480" y="130" text-anchor="middle" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">1. getByRole — best (a11y + user intent)</text>
  <rect x="130" y="160" width="700" height="48" rx="8" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="480" y="190" text-anchor="middle" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="16">2. getByLabel — form fields</text>
  <rect x="160" y="220" width="640" height="48" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="250" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Arial, sans-serif" font-size="15">3. getByText / getByPlaceholder / getByAltText / getByTitle</text>
  <rect x="190" y="280" width="580" height="48" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="310" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Arial, sans-serif" font-size="15">4. getByTestId — stable when UI copy is noisy</text>
  <rect x="220" y="340" width="520" height="48" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="480" y="370" text-anchor="middle" fill="#9a3412" font-family="Segoe UI, Arial, sans-serif" font-size="15">5. CSS locator — OK fallback</text>
  <rect x="250" y="400" width="460" height="48" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="480" y="430" text-anchor="middle" fill="#991b1b" font-family="Segoe UI, Arial, sans-serif" font-size="15">6. XPath — last resort</text>
  <text x="40" y="480" fill="#374151" font-family="Segoe UI, Arial, sans-serif" font-size="14">Locators re-resolve on every action — unlike a one-shot element handle.</text>
  <text x="40" y="505" fill="#9ca3af" font-family="Segoe UI, Arial, sans-serif" font-size="12">English illustration — Playwright TypeScript guide</text>
</svg>
