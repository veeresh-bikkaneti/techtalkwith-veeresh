<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Optional AI locator healing">
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="800" y="70" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="600" fill="#111">Locator broke? Optional one-retry healing.</text>
  <!-- broken locator -->
  <rect x="200" y="380" width="200" height="70" fill="#fff" stroke="#111" stroke-width="3"/>
  <text x="300" y="425" text-anchor="middle" font-family="monospace" font-size="22" fill="#111">@FindBy</text>
  <path d="M420 415 L480 415" stroke="#c0392b" stroke-width="4"/>
  <text x="300" y="500" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#c0392b">locator dead</text>
  <!-- Xiaohei with magnifier -->
  <ellipse cx="180" cy="560" rx="36" ry="46" fill="#111"/>
  <circle cx="170" cy="550" r="6" fill="#fff"/>
  <circle cx="190" cy="550" r="6" fill="#fff"/>
  <circle cx="320" cy="360" r="50" fill="none" stroke="#111" stroke-width="4"/>
  <line x1="355" y1="395" x2="400" y2="440" stroke="#111" stroke-width="4"/>
  <!-- optional cloud -->
  <ellipse cx="720" cy="320" rx="180" ry="70" fill="#fff" stroke="#111" stroke-width="3"/>
  <text x="720" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#2980b9">Ask Claude</text>
  <text x="720" y="345" text-anchor="middle" font-family="monospace" font-size="18" fill="#111">.btn:active</text>
  <text x="720" y="400" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#c0392b">optional</text>
  <path d="M500 400 Q600 350, 540 320" fill="none" stroke="#e67e22" stroke-width="4" stroke-dasharray="8 6"/>
  <!-- working button -->
  <rect x="1100" y="360" width="260" height="90" rx="12" fill="#fff" stroke="#111" stroke-width="4"/>
  <text x="1230" y="415" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#111">Button ✓</text>
  <text x="1230" y="490" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#e67e22">retry once</text>
  <text x="1230" y="560" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#555">off unless API key set</text>
</svg>