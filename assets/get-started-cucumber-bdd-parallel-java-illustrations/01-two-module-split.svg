<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Two Maven modules: framework core and example tests">
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="800" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="600" fill="#111">Two modules. One clone. You're in business.</text>
  <!-- shelf -->
  <path d="M280 620 L1320 620 L1320 640 L280 640 Z" fill="#8B5A2B" stroke="#111" stroke-width="3"/>
  <path d="M320 640 L340 700 L360 640" fill="none" stroke="#111" stroke-width="3"/>
  <path d="M1240 640 L1260 700 L1280 640" fill="none" stroke="#111" stroke-width="3"/>
  <!-- left box framework -->
  <rect x="340" y="420" width="380" height="200" rx="8" fill="#fff" stroke="#111" stroke-width="4"/>
  <text x="530" y="470" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#111">framework/</text>
  <text x="530" y="515" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#c0392b">reusable core</text>
  <text x="530" y="560" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#555">hooks · waits · BasePage</text>
  <!-- right box example -->
  <rect x="880" y="420" width="380" height="200" rx="8" fill="#fff" stroke="#111" stroke-width="4"/>
  <text x="1070" y="470" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#111">example-tests/</text>
  <text x="1070" y="515" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#2980b9">working demo</text>
  <text x="1070" y="560" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#555">features · pages · runners</text>
  <!-- Xiaohei -->
  <ellipse cx="1220" cy="560" rx="42" ry="52" fill="#111"/>
  <circle cx="1208" cy="548" r="7" fill="#fff"/>
  <circle cx="1232" cy="548" r="7" fill="#fff"/>
  <line x1="1220" y1="612" x2="1200" y2="680" stroke="#111" stroke-width="5"/>
  <line x1="1220" y1="612" x2="1240" y2="680" stroke="#111" stroke-width="5"/>
  <!-- browser -->
  <rect x="1180" y="220" width="280" height="180" rx="10" fill="#fff" stroke="#111" stroke-width="4"/>
  <circle cx="1210" cy="248" r="8" fill="#e74c3c"/>
  <circle cx="1240" cy="248" r="8" fill="#f39c12"/>
  <circle cx="1270" cy="248" r="8" fill="#27ae60"/>
  <line x1="1195" y1="275" x2="1445" y2="275" stroke="#111" stroke-width="2"/>
  <rect x="1220" y="300" width="200" height="70" rx="4" fill="none" stroke="#111" stroke-width="2"/>
  <!-- arrows -->
  <path d="M720 520 C900 480, 1000 360, 1180 320" fill="none" stroke="#e67e22" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="950" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#e67e22">clone &amp; run</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#e67e22"/>
    </marker>
  </defs>
</svg>