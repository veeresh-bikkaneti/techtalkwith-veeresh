# Site Settings
title: "Tech Talk with Veeresh"
description: "Principal QA Architect · AI Test Architect · 20+ Years in Enterprise Quality Engineering. AI-driven test strategy, automation frameworks, and software quality insights."

# Production URL: served from the GitHub Pages project path (no custom domain).
# url + baseurl together form https://veeresh-bikkaneti.github.io/techtalkwith-veeresh/.
# An earlier veeresh.is-a.dev custom-domain plan was abandoned because the DNS server setup was not successful (the upstream is-a-dev/register PR was never filed).
url: "https://veeresh-bikkaneti.github.io"
baseurl: "/techtalkwith-veeresh"
author: "Veeresh Bikkaneti"

# Build Settings
future: true  # publish posts dated in the future (allows scheduling)
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
include:
  - .nojekyll
# Exclude dev artifacts (also in .gitignore) from the public build output.
# Without this, Jekyll copies everything in the project root into _site/,
# which would leak the Karpathy-orchestrator spec and the project's local
# memory file to https://veeresh-bikkaneti.github.io/techtalkwith-veeresh/AGENTS.md.
exclude:
  - AGENTS.md
  - knowledge.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Site Navigation
header_pages:
  - about.md
  - blog/index.html

# SEO & Open Graph
locale: en_US
twitter:
  username: "sdetbaveer"
  card: "summary_large_image"

social:
  name: Veeresh Bikkaneti
  links:
    - https://www.linkedin.com/in/sdetbaveer/
    - https://github.com/veeresh-bikkaneti

# Open Graph defaults
image: /assets/images/og-image.svg
theme_color: "#06b6d4"

# Footer
footer:
  links:
    - label: GitHub
      icon: fab fa-fw fa-github-square
      url: https://github.com/veeresh-bikkaneti
    - label: LinkedIn
      icon: fab fa-fw fa-linkedin
      url: https://www.linkedin.com/in/sdetbaveer/
    - label: Email
      icon: fas fa-fw fa-envelope
      url: mailto:resume.qasdet@gmail.com
    - label: RSS Feed
      icon: fas fa-fw fa-rss
      url: /feed.xml
