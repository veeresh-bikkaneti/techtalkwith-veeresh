# Ignore low-severity nokogiri vulnerabilities in old github-pages
# These are addressed by newer versions but github-pages gem pins older nokogiri
ignore:
  - GHSA-v2fc-qm4h-8hqv # nokogiri: Use-After-Free via attribute value
  - GHSA-wfpw-mmfh-qq69 # nokogiri: XSLT memory leak
  - GHSA-wjv4-x9w8-wm3h # nokogiri: Use-After-Free in XInclude
  - GHSA-wjv4-x9w8-wm3h # nokogiri: root= invalid node type
  - GHSA-wx95-c6cv-8532 # nokogiri: Use-After-Free when setting attribute
  - GHSA-5prr-v3j2-97mh # nokogiri: xmlC14NExecute
  - GHSA-5v8h-3h3q-446p # nokogiri: Out-of-Bounds Read in NodeSet
